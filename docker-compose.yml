services:
  # ---------------------------------------------------------------------------
  # Redis — cache (DB 0), Celery broker (DB 1), Celery results (DB 2)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: neurotwin-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - neurotwin

  # ---------------------------------------------------------------------------
  # Web — Django + Gunicorn
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neurotwin-web
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - USE_REDIS=True
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    stop_grace_period: 30s
    volumes:
      - static_files:/app/staticfiles
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - neurotwin

  # ---------------------------------------------------------------------------
  # Celery Worker — background task processing
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neurotwin-celery-worker
    command: celery -A neurotwin worker -l info -Q default,high_priority,incoming_messages,outgoing_messages --concurrency ${CELERY_CONCURRENCY:-4}
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - USE_REDIS=True
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "neurotwin", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - neurotwin

  # ---------------------------------------------------------------------------
  # Celery Beat — periodic task scheduler
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neurotwin-celery-beat
    command: celery -A neurotwin beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler --pidfile /tmp/celerybeat.pid
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - USE_REDIS=True
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/celerybeat.pid"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - neurotwin

volumes:
  redis_data:
    driver: local
  static_files:
    driver: local

networks:
  neurotwin:
    driver: bridge
